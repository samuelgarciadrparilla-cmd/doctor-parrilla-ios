workflows:
  ios-release:
    name: iOS Release to App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - firebase_credentials
      vars:
        BUNDLE_ID: "com.drparrilla.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Inject GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.0 \
            --build-number=1
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - drparrillaparaguay@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release to Play Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
      groups:
        - play_store_credentials
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.drparrilla.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Inject google-services.json
        script: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > $CM_BUILD_DIR/android/app/google-services.json
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build AAB
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=1
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - drparrillaparaguay@gmail.com
        notify:
          success: true
          failure: true

  screenshots:
    name: App Store Screenshots
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_credentials
      vars:
        BUNDLE_ID: "com.drparrilla.app"
    scripts:
      - name: Inject GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build for simulator
        script: |
          flutter build ios --simulator
      - name: Screenshot - iPhone 16 Pro Max (6.9")
        script: |
          xcrun simctl shutdown "iPhone 16 Pro Max" 2>/dev/null || true
          xcrun simctl boot "iPhone 16 Pro Max"
          xcrun simctl install booted build/ios/iphonesimulator/Runner.app
          xcrun simctl launch booted "$BUNDLE_ID"
          sleep 20
          mkdir -p screenshots
          xcrun simctl io booted screenshot screenshots/screenshot_69.png
          xcrun simctl shutdown booted
      - name: Screenshot - iPhone 11 Pro Max (6.5")
        script: |
          xcrun simctl shutdown "iPhone 11 Pro Max" 2>/dev/null || true
          xcrun simctl boot "iPhone 11 Pro Max"
          xcrun simctl install booted build/ios/iphonesimulator/Runner.app
          xcrun simctl launch booted "$BUNDLE_ID"
          sleep 20
          xcrun simctl io booted screenshot screenshots/screenshot_65.png
          xcrun simctl shutdown booted
    artifacts:
      - screenshots/*.png
