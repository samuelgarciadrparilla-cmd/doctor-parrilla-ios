name: dr_parrilla_app
description: "Doctor Parrilla Paraguay - Parrillas Premium de Acero Inoxidable"
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  webview_flutter: ^4.13.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  connectivity_plus: ^7.1.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#000000"

flutter_native_splash:
  color: "#000000"
  image: "assets/splash/splash_logo.png"
  android: true
  ios: true
  android_12:
    color: "#000000"
    image: "assets/splash/splash_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
    - assets/images/
